module_name: Terraform Site-to-Site VPN Networking Module
module_description: The Terraform Wrapper for Site-to-Site VPN simplifies AWS networking integration (Customer Gateway / Virtual Private Gateway or Transit Gateway attachment / VPN connection / static routes & route table propagation / tunnel options / etc.) alongside the VPC and TGW wrappers.
module_badges:
  - url: "https://github.com/gocloudLa/terraform-aws-wrapper-vpn/releases/latest"
    image: "https://img.shields.io/github/v/release/gocloudLa/terraform-aws-wrapper-vpn.svg?style=for-the-badge"
    alt: "Latest Release"
  - url: ""
    image: "https://img.shields.io/github/last-commit/gocloudLa/terraform-aws-wrapper-vpn.svg?style=for-the-badge"
    alt: "Last Commit"
  - url: "https://registry.terraform.io/modules/gocloudLa/wrapper-vpn/aws"
    image: "https://img.shields.io/badge/Terraform-Registry-7B42BC?style=for-the-badge&logo=terraform&logoColor=white"
    alt: "Terraform Registry"
quick_start: |
  ```hcl
  # Inside: module "wrapper_vpn" { source = "gocloudLa/wrapper-vpn/aws" ... }

  metadata = local.metadata

  vpc_parameter = {
    vpcs         = module.wrapper_vpc.vpcs
    subnets      = module.wrapper_vpc.subnets
    route_tables = module.wrapper_vpc.route_tables
  }

  tgw_parameter = {
    transit_gateway = module.wrapper_tgw.transit_gateway
  }

  vpn_parameters = {
    "vpn-01" = {
      vpc = "prod"
      virtual_private_gateway = {
        amazon_side_asn = 64512
      }
      customer_gateway = {
        ip_address = "203.0.113.10"
      }
      vpn_connection = {
        remote_ipv4_network_cidr   = "10.0.0.0/16"
        static_routes_only         = true
        static_routes_destinations = ["10.1.0.0/24"]
        route_table_names          = ["mycompany-prod-private"]
        tunnel1_preshared_key      = "use-a-secret-or-var" # min 8 chars; do not commit real keys
        tunnel2_preshared_key      = "use-a-secret-or-var"
      }
    }
  }

  vpn_defaults = var.vpn_defaults
  ```
features:
  - icon: 🔐
    title: Customer Gateway and VPN connection
    short_description: Create (or reference) a Customer Gateway and a Site-to-Site VPN with two tunnels
    long_description: |
      Each `vpn_parameters` entry resolves `customer_gateway` fields (`ip_address`, optional `device_name`, `bgp_asn`, certificates) and `vpn_connection` options (static vs BGP, CIDRs, per-tunnel IKE/crypto, CloudWatch logging). See `modules/aws/terraform-aws-vpn-site-to-site/variables.tf` for the full low-level variable list passed through from the wrapper.
    examples:
      - title: Minimal customer_gateway + vpn_connection
        code: |
          ```hcl
          customer_gateway = {
            ip_address = "203.0.113.10"
          }
          vpn_connection = {
            remote_ipv4_network_cidr = "10.0.0.0/16"
            static_routes_only       = false
          }
          ```
  - icon: 🌐
    title: VPC (VGW) or Transit Gateway
    short_description: Attach the VPN to a VPC via Virtual Private Gateway or to a Transit Gateway
    long_description: |
      Set `vpc` to a key in `vpc_parameter.vpcs` to resolve `vpc_id`, or pass `vpc_id` directly. For TGW-based VPN, set `tgw` to a key in `tgw_parameter.transit_gateway` (outputs from the TGW wrapper) or pass `transit_gateway_id`. Optional `transit_gateway_route_table_id` and `transit_gateway_routes` feed TGW static routes for the VPN attachment.
    examples: []
  - icon: 🛤️
    title: Route propagation to VPC route tables
    short_description: Resolve route tables by Name tag for VGW route propagation
    long_description: |
      When `vpn_connection.route_table_names` is set, the wrapper uses a `aws_route_tables` data source filtered by `tag:Name`. Returned IDs are passed as `route_table_ids` to the inner module so static routes can propagate. Names must match the `Name` tag on your route tables (often aligned with the VPC wrapper naming).
    examples: []
  - icon: ⚙️
    title: Tunnel and logging options
    short_description: Per-tunnel IKE versions, Phase 1/2 algorithms, PSKs, DPD, and CloudWatch logs
    long_description: |
      Under `vpn_connection`, use keys such as `tunnel1_preshared_key`, `tunnel1_ike_versions`, `tunnel1_phase1_encryption_algorithms`, `tunnel1_cloudwatch_log_enabled`, and the same for `tunnel2_*`. Defaults are applied in the root `main.tf` when omitted.
    examples: []

important_notes: |
  - **Secrets**: Preshared keys and sensitive tunnel settings end up in Terraform state; prefer `variable` + external secrets (SSM, Secrets Manager) or `-var` / CI secrets.
  - **VPC key**: Use `vpc` (string) matching a key in `vpc_parameter.vpcs`, or supply `vpc_id` when not using the VPC wrapper map.
  - **TGW key**: Use `tgw` matching a key in `tgw_parameter.transit_gateway` (e.g. output map from `wrapper-tgw`), or set `transit_gateway_id` explicitly.
  - **Route table names**: `route_table_names` must match the **`Name` tag** values on existing route tables in the account/region.
  - **Submodule reference**: Behaviour and resource wiring are implemented in `modules/aws/terraform-aws-vpn-site-to-site` (variables mirror AWS resources).
  - **Client VPN**: Placeholder sections in `main.tf` / `variables.tf` are not implemented yet.

input_table: |
  | vpc | Key into `vpc_parameter.vpcs` for `vpc_id`. | `string` | no |
  | vpc_id | Explicit VPC ID if not using `vpc`. | `string` | no |
  | tgw | Key into `tgw_parameter.transit_gateway` for `ec2_transit_gateway_id`. | `string` | no |
  | transit_gateway_id | Explicit Transit Gateway ID. | `string` | no |
  | transit_gateway_route_table_id | TGW route table for static routes. | `string` | no |
  | transit_gateway_routes | Map of TGW routes (`destination_cidr_block`, optional `blackhole`). | `map` | no |
  | virtual_private_gateway | `amazon_side_asn` for VGW (and future VGW overrides). | `object` | no |
  | customer_gateway | `ip_address` (required to create CGW), optional `device_name`, `bgp_asn`, `certificate_arn`, etc. | `object` | no |
  | vpn_connection | Connection options: `static_routes_only`, `static_routes_destinations`, `route_table_names`, `remote_ipv4_network_cidr`, `local_ipv4_network_cidr`, `log_retention_in_days`, and all `tunnel1_*` / `tunnel2_*` keys. | `object` | no |
  | create_vpn_connection | Whether to create the VPN connection. | `bool` | no |
  | tags | Extra tags (merged with `common_tags` / `Name`). | `map` | no |