title: "Complete Site-to-Site VPN Example"
description: "This example wires the VPN wrapper with metadata, optional `vpc_parameter` and `tgw_parameter` inputs (typically from the VPC and TGW wrappers), and a sample `vpn_parameters` entry using a Virtual Private Gateway, Customer Gateway, static routes, route table name resolution, and per-tunnel IKE and CloudWatch logging options."
main_purpose: "The main purpose is to show how to call `module.wrapper_vpn` with the same file split as other Standard Platform examples (main.tf, variables.tf, metadata.tf, locals.tf for example-specific locals, providers.tf, data_sources.tf, outputs.tf, conditions.tf) and to document the relationship between `vpc` keys, `route_table_keys` (into `vpc_parameter.route_tables`), and tunnel configuration."
key_features:
  - "**Inputs**: `vpc_parameter` and `tgw_parameter` are passed as variables (defaults empty) so a root module can inject outputs from `wrapper-vpc` and `wrapper-tgw`."
  - "**VPN entry**: One logical key (`vpn-01`) with `vpc` pointing at a VPC map key, `virtual_private_gateway`, `customer_gateway` with public IP, and extended `vpn_connection` settings."
  - "**Static routing**: `static_routes_only`, `static_routes_destinations`, and `route_table_keys` aligned with wrapper-vpc `route_tables` keys for VGW propagation."
  - "**Tunnels**: Explicit `tunnel1_*` and `tunnel2_*` options (IKE versions, phases, PSK placeholders, CloudWatch log toggles) matching the inner `terraform-aws-vpn-site-to-site` module."
  - "**Tags**: Optional `tags` merged from `local.custom_tags` for resource-level labels."
